services:
  - type: web
    name: red-tape-engine
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install && npm run db:migrate
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DEMO_MODE
        value: "true"
      - key: AGILEPILOT_DEFAULT_PROVIDER
        value: octopus
      - key: AGILEPILOT_ENTERPRISE_MODE
        value: "true"
      - key: AGILEPILOT_FORCE_DEMO
        value: "false"
      - key: AGILEPILOT_DEMO_TENANT_ID
        value: "0e99308d-9a09-4620-b420-4951eacaf971"
      - key: DATABASE_URL
        sync: false
      - key: XAI_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_API_KEY_SID
        sync: false
      - key: TWILIO_API_KEY_SECRET
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_TRADETAP
        sync: false
      - key: CALCOM_WEBHOOK_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      - key: AGILEPILOT_ADMIN_KEY
        sync: false
      - key: OCTOPUS_API_KEY
        sync: false
